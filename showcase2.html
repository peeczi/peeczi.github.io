<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crushed&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sirin+Stencil&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Unlock&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Airin' My Errands</title>
</head>
<body>
    <header id="show2-title">
        Airin' My Errands
    </header>
    <div id="page-links">
        <a href="index.html">Look At What I Can Do</a>
        <a href="showcase1.html">No Budging with MY BUDGET</a>
        <a href="showcase3.html">No Thought for Food</a>
    </div>
    <div id="show2-head">
        <div class="form-section-label">
            Car<br>
        </div>
        <form> 
            <label for="engine-oil">Engine Oil</label>
            <input type="text" placeholder="Engine Oil Type" name="engine-oil" id="engine-oil">
            Previous Engine Oil Change: <input type="date" name="engine-oil-change"><br>
            <label for="brake-fluid">Brake Fluid</label>
            <input type="text" placeholder="Brake Fluid Type" name="brake-fluid" id="brake-fluid">
            Previous Brake Fluid Change: <input type="date" name="brake-fluid-change"><br>
            <label for="coolant">Coolant</label>
            <input type="text" placeholder="Coolant" name="coolant" id="coolant"><br>
            <input type="submit">
        </form>
        <div class="form-section-label">
            <hr>Home<br>
        </div>
        <form>
            <label for="heater-filter">Heater Filter</label>
            <input type="text" placeholder="Heater Filter" name="heater-filter" id="heater-filter">
            Previous Heater Filter Change: <input type="date" name="heater-filter"><br>
            Previous Duct Clean: <input type="date" name="duct-clean"><br>
            <input type="submit">
        </form>
        <div class="form-section-label">
            <hr>Medical<br>
        </div>
        <form>
            <label for="dentist">Dentist</label>
            <input type="text" placeholder="Dentist" name="dentist" id="dentist">
            Previous Dentist Visit: <input type="date" name="dentist-visit"><br>
            <label for="doctor">Doctor</label>
            <input type="text" placeholder="Doctor" name="doctor" id="doctor">
            Previous Doctor Visit: <input type="date" name="physical"><br>
            <label for="chiropractor">Chiropractor</label>
            <input type="text" placeholder="Chiropractor" name="chiropractor" id="chiropractor">
            Previous Chiropractor Visit: <input type="date" name="chiropractor-visit"><br>
            <input type="submit">
        </form>
    </div>
</body>
</html>
